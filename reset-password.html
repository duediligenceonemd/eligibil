<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Resetare parolă · eligibil.org</title>
<meta name="description" content="Solicită un link de resetare a parolei sau setează o parolă nouă pentru contul eligibil.org." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/styles-mobile.css?v=20260514h" />
<link rel="stylesheet" href="/styles-register.css" />
<script src="/app-config.js" defer></script>
<script src="/analytics.js" defer></script>
<script src="/cookie-consent.js" defer></script>
<style>
  .reset-shell { min-height: 100vh; display: grid; place-items: center; padding: 48px 20px; background: var(--bg); }
  .reset-card { width: 100%; max-width: 520px; background: #fff; border: 1px solid var(--line); padding: 32px; box-shadow: 0 20px 60px rgba(16,24,40,.08); }
  .reset-kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: var(--muted); margin-bottom: 16px; }
  .reset-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(28px, 4vw, 42px); line-height: 1; margin: 0 0 12px; letter-spacing: -.03em; }
  .reset-copy { color: var(--muted); font-size: 15px; line-height: 1.6; margin: 0 0 28px; }
  .reset-actions { display: flex; flex-direction: column; gap: 18px; }
  .reset-note { margin-top: 18px; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .reset-error, .reset-success { padding: 12px 16px; border: 1px solid; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .reset-error { background: rgba(194,74,30,.08); border-color: var(--hot); color: var(--hot); }
  .reset-success { background: rgba(10,92,62,.08); border-color: #0a5c3e; color: #0a5c3e; }
</style>
</head>
<body class="d-balanced">
<div class="reset-shell">
  <div class="reset-card">
    <div class="reset-kicker">Account recovery</div>
    <h1 class="reset-title" id="reset-title">Resetează parola</h1>
    <p class="reset-copy" id="reset-copy">Solicită un link securizat sau setează direct parola nouă dacă ai deschis deja emailul de resetare.</p>
    <div id="reset-status"></div>

    <form id="forgot-form" class="reset-actions">
      <div class="reg-field">
        <label class="reg-label" for="forgot-email">Email</label>
        <input class="reg-input" id="forgot-email" type="email" placeholder="tu@startup.md" required />
      </div>
      <button type="submit" class="btn btn--accent">Trimite linkul de resetare</button>
    </form>

    <form id="reset-form" class="reset-actions" hidden>
      <div class="reg-field">
        <label class="reg-label" for="new-password">Parolă nouă</label>
        <input class="reg-input" id="new-password" type="password" minlength="10" required />
      </div>
      <div class="reg-field">
        <label class="reg-label" for="confirm-password">Confirmă parola</label>
        <input class="reg-input" id="confirm-password" type="password" minlength="10" required />
      </div>
      <button type="submit" class="btn btn--accent">Actualizează parola</button>
    </form>

    <div class="reset-note">
      <a href="/login.html" style="color:var(--accent);text-decoration:underline;">Înapoi la autentificare</a>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';

  const forgotForm = document.getElementById('forgot-form');
  const resetForm = document.getElementById('reset-form');
  const statusEl = document.getElementById('reset-status');
  const titleEl = document.getElementById('reset-title');
  const copyEl = document.getElementById('reset-copy');

  function setStatus(type, message) {
    statusEl.innerHTML = message ? '<div class="' + (type === 'success' ? 'reset-success' : 'reset-error') + '">' + message + '</div>' : '';
  }

  async function verifyToken() {
    if (!token) return;
    try {
      const res = await fetch('/api/auth/reset-password/verify?token=' + encodeURIComponent(token), { credentials: 'same-origin' });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        setStatus('error', data.error || 'Link invalid sau expirat.');
        return;
      }
      forgotForm.hidden = true;
      resetForm.hidden = false;
      titleEl.textContent = 'Setează parola nouă';
      copyEl.textContent = 'Alege o parolă nouă, puternică, pentru contul tău eligibil.org.';
    } catch {
      setStatus('error', 'Nu am putut valida linkul de resetare.');
    }
  }

  forgotForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    setStatus('', '');
    const email = document.getElementById('forgot-email').value.trim();
    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus('error', data.error || 'Nu am putut trimite emailul.');
        return;
      }
      setStatus('success', data.message || 'Dacă emailul există în sistem, vei primi un link de resetare.');
      forgotForm.reset();
    } catch {
      setStatus('error', 'Eroare de rețea. Încearcă din nou.');
    }
  });

  resetForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    setStatus('', '');
    const password = document.getElementById('new-password').value;
    const confirm = document.getElementById('confirm-password').value;
    if (password !== confirm) {
      setStatus('error', 'Parolele nu coincid.');
      return;
    }
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        setStatus('error', data.error || 'Nu am putut actualiza parola.');
        return;
      }
      setStatus('success', 'Parola a fost actualizată. Te poți autentifica acum.');
      resetForm.reset();
      setTimeout(() => { window.location.href = '/login.html'; }, 1500);
    } catch {
      setStatus('error', 'Eroare de rețea. Încearcă din nou.');
    }
  });

  verifyToken();
</script>
<script src="/clarity.js"></script>
<script src="/waitlist-popup.js" defer></script>
</body>
</html>

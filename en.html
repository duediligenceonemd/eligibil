<script>
const TWEAK_DEFAULTS = { accent: 'navy', density: 'balanced', dark: false, showReport: true };
const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };
function applyTweaks(t) {
  document.documentElement.style.setProperty('--accent', ACCENTS[t.accent] || ACCENTS.navy);
  document.body.classList.remove('d-spacious', 'd-balanced', 'd-dense');
  document.body.classList.add('d-' + (t.density || 'balanced'));
  document.body.classList.toggle('dark', !!t.dark);
  window.__TWEAKS = t;
  window.dispatchEvent(new CustomEvent('tweaks-change', { detail: t }));
}
let tweaks = { ...TWEAK_DEFAULTS };
applyTweaks(tweaks);
window.__FORCE_LANG = 'EN';
try { localStorage.setItem('eligibil_lang', 'EN'); } catch (e) {}
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  const bar = document.getElementById('scroll-bar');
  if (bar) bar.style.width = pct + '%';
});
</script>

<script type="text/babel">
const { useState: useStateApp, useEffect: useEffectApp } = React;

function App() {
  const [lang, setLangState] = useStateApp('EN');
  const setLang = (l) => {
    setLangState(l);
    if (window.setLanguage) window.setLanguage(l);
  };
  const [showReport, setShowReport] = useStateApp(window.__TWEAKS?.showReport ?? true);

  useEffectApp(() => {
    if (window.setLanguage) window.setLanguage('EN');
    const onT = (e) => setShowReport(!!e.detail.showReport);
    const onLang = (e) => setLangState(e.detail.lang);
    window.addEventListener('tweaks-change', onT);
    window.addEventListener('languagechange', onLang);
    return () => {
      window.removeEventListener('tweaks-change', onT);
      window.removeEventListener('languagechange', onLang);
    };
  }, []);

  return (
    <>
      <NavOrg lang={lang} setLang={setLang} />
      <HeroOrg lang={lang} />
      <Deadlines />
      <UploadFlow />
      {showReport && <SampleReportOrg />}
      <ProductsOrg />
      <DocGenOrg />
      <ProgramsOrg />
      <VerticalsGrid />
      <AboutOrg />
      <VerifiedPartners />
      <ResourcesOrg />
      <ReportsOrg />
      <DataQualityOrg />
      <FAQOrg />
      <FinalCTAOrg />
      <FooterOrg lang={lang} setLang={setLang} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
  .ev-hero { padding: 64px 0 28px; border-bottom: 1px solid var(--border-soft); }
  .ev-crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .ev-crumbs a { color: inherit; text-decoration: none; }
  .ev-type { display: inline-block; padding: 3px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; background: var(--accent); color: #fff; border-radius: 3px; }
  .ev-title { font-size: clamp(28px, 5vw, 48px); font-weight: 700; margin: 14px 0 8px; font-family: 'Space Grotesk', sans-serif; line-height: 1.08; }
  .ev-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-2); }
  .ev-meta strong { color: var(--ink-1); }
  .ev-body { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr); gap: 48px; padding: 48px 0; }
  @media (max-width: 800px) { .ev-body { grid-template-columns: 1fr; gap: 28px; } }
  .ev-section { margin-bottom: 32px; }
  .ev-section h2 { font-size: 22px; margin: 0 0 12px; font-family: 'Space Grotesk', sans-serif; }
  .ev-section p { font-size: 15px; line-height: 1.65; color: var(--ink-1); margin: 0 0 12px; }
  .ev-aside { padding: 24px; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: 4px; }
  .ev-aside dt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-top: 14px; }
  .ev-aside dt:first-child { margin-top: 0; }
  .ev-aside dd { margin: 4px 0 0; font-size: 14px; color: var(--ink-1); }
  .ev-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 18px; }
  .ev-tag { padding: 4px 10px; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .ev-cta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
  .ev-similar { padding: 32px 0 64px; border-top: 1px solid var(--border-soft); }
  .ev-similar h2 { font-size: 22px; margin: 0 0 16px; font-family: 'Space Grotesk', sans-serif; }
  .ev-similar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 800px) { .ev-similar-grid { grid-template-columns: 1fr; } }
  .ev-similar-card { padding: 18px; background: var(--bg-2); border: 1px solid var(--border-soft); text-decoration: none; color: inherit; }
  .ev-similar-card:hover { border-color: var(--accent); }
  .ev-similar-card h3 { font-size: 16px; margin: 0 0 6px; font-family: 'Space Grotesk', sans-serif; }
  .ev-similar-card p { font-size: 13px; color: var(--ink-2); margin: 0; }
</style>

<script>
const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };
let tweaks = { accent: 'navy', density: 'balanced', dark: false };
(function () {
  document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent]);
  document.body.classList.add('d-' + tweaks.density);
})();
</script>

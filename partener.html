<style>
  .pt__hero { padding: 64px 0 28px; border-bottom: 1px solid var(--border-soft); }
  .pt__crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .pt__crumbs a { color: inherit; text-decoration: none; }
  .pt__head { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
  .pt__logo { width: 96px; height: 96px; flex-shrink: 0; background: var(--bg-2); border: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: center; }
  .pt__meta { flex: 1; min-width: 280px; }
  .pt__verified { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #ecfdf5; color: #047857; font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; border-radius: 3px; }
  .pt__region { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-2); margin-left: 8px; }
  .pt__title { font-size: clamp(28px, 5vw, 44px); font-weight: 700; margin: 12px 0 4px; font-family: 'Space Grotesk', sans-serif; line-height: 1.1; }
  .pt__sub { font-size: 14px; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .08em; }
  .pt__desc { font-size: 17px; line-height: 1.55; color: var(--ink-1); margin: 18px 0 0; max-width: 760px; }
  .pt__tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 0; }
  .pt__tag { padding: 4px 10px; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .pt__body { display: grid; grid-template-columns: minmax(0, 2fr) minmax(0, 1fr); gap: 48px; padding: 48px 0; }
  @media (max-width: 800px) { .pt__body { grid-template-columns: 1fr; gap: 28px; } }
  .pt__section { margin-bottom: 32px; }
  .pt__sidehead { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px; }
  .pt__section h3 { font-size: 22px; margin: 0 0 12px; font-family: 'Space Grotesk', sans-serif; }
  .pt__section p { font-size: 15px; line-height: 1.6; color: var(--ink-1); margin: 0 0 12px; }
  .pt__aside { padding: 24px; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: 4px; }
  .pt__aside dt { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-top: 14px; }
  .pt__aside dt:first-child { margin-top: 0; }
  .pt__aside dd { margin: 4px 0 0; font-size: 14px; color: var(--ink-1); }
  .pt__cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }

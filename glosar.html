<style>
  .gl__hero { padding: 64px 0 32px; border-bottom: 1px solid var(--border-soft); }
  .gl__crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .gl__crumbs a { color: inherit; text-decoration: none; }
  .gl__crumbs a:hover { color: var(--accent); }
  .gl__title { font-size: clamp(32px, 5vw, 52px); font-weight: 700; line-height: 1.05; margin: 0 0 8px; font-family: 'Space Grotesk', sans-serif; }
  .gl__sub { font-size: 18px; line-height: 1.45; color: var(--ink-1); max-width: 780px; margin: 16px 0 0; }
  .gl__intro { font-size: 15px; line-height: 1.6; color: var(--ink-2); max-width: 780px; margin: 16px 0 0; }
  .gl__search { width: 100%; padding: 14px 16px; border: 1px solid var(--border-soft); background: var(--bg-1); border-radius: 4px; font-family: inherit; font-size: 16px; margin-top: 28px; }
  .gl__search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .gl__pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .gl__pill { padding: 6px 12px; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; cursor: pointer; user-select: none; transition: all .15s; }
  .gl__pill:hover { border-color: var(--accent); color: var(--accent); }
  .gl__pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .gl__az { display: flex; flex-wrap: wrap; gap: 6px; padding: 16px 0; margin: 24px 0; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; background: var(--bg-1); z-index: 5; }
  .gl__az a { padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-1); text-decoration: none; border: 1px solid transparent; border-radius: 3px; }
  .gl__az a:hover { border-color: var(--accent); color: var(--accent); }
  .gl__az a.disabled { color: var(--ink-3, #aaa); pointer-events: none; }
  .gl__letter { padding: 32px 0 8px; }
  .gl__letter h2 { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: .12em; padding-bottom: 8px; border-bottom: 1px solid var(--accent); margin: 0 0 16px; }
  .gl__term { padding: 18px 0; border-bottom: 1px solid var(--border-soft); }
  .gl__term[open] summary { color: var(--accent); }
  .gl__term summary { cursor: pointer; font-weight: 600; font-size: 17px; padding-right: 28px; position: relative; font-family: 'Space Grotesk', sans-serif; }
  .gl__term summary::-webkit-details-marker { display: none; }
  .gl__term summary::after { content: '+'; position: absolute; right: 0; top: 0; font-size: 20px; color: var(--accent); }
  .gl__term[open] summary::after { content: '−'; }
  .gl__term p { margin: 12px 0 0; color: var(--ink-1); font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
  .gl__term .gl__ex { margin: 10px 0 0; padding: 10px 14px; background: var(--bg-2); border-left: 3px solid var(--accent); font-size: 14px; color: var(--ink-2); font-style: italic; }
  .gl__term .gl__tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .gl__term .gl__tag { padding: 2px 8px; background: var(--bg-2); border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; }
  .gl__popular { padding: 32px 0; background: var(--bg-2); border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
  .gl__popular h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .1em; margin: 0 0 12px; }
  .gl__popular-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .gl__popular-chip { padding: 6px 12px; background: var(--bg-1); border: 1px solid var(--border-soft); border-radius: 3px; font-size: 13px; cursor: pointer; }
  .gl__popular-chip:hover { border-color: var(--accent); color: var(--accent); }
  .gl__empty { padding: 48px 0; text-align: center; color: var(--ink-2); font-style: italic; }
  .gl__cta { padding: 48px 0; background: var(--bg-2); border-top: 1px solid var(--border-soft); }
  .gl__cta h2 { font-size: 28px; margin: 0 0 8px; font-family: 'Space Grotesk', sans-serif; }
  .gl__cta p { font-size: 16px; color: var(--ink-2); margin: 0 0 20px; max-width: 680px; }
  .gl__cta-btns { display: flex; flex-wrap: wrap; gap: 12px; }
  .gl__count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }
</style>

<body class="d-balanced">

<div id="root"><div style="padding:48px;text-align:center;color:#666">Se încarcă glosarul…</div></div>

<script>
const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };
let tweaks = { accent: 'navy', density: 'balanced', dark: false };
(function () {
  document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent]);
  document.body.classList.add('d-' + tweaks.density);
})();
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="/data.js?v=20260514e"></script>
<script src="/data-org.js?v=20260514e"></script>
<script src="/data-glosar.js?v=20260514e"></script>

<script type="text/babel" src="/components-org-a.jsx?v=20260514e"></script>
<script type="text/babel" src="/components-org-b.jsx?v=20260514e"></script>
<script type="text/babel" src="/components-org-c.jsx?v=20260514e"></script>

<script type="text/babel">
const { useState: useStateG, useEffect: useEffectG, useMemo: useMemoG } = React;

const DIACRITICS_MAP = { 'ă':'a','â':'a','î':'i','ș':'s','ț':'t','Ă':'A','Â':'A','Î':'I','Ș':'S','Ț':'T' };
function strip(s) { return (s || '').replace(/[ăâîșțĂÂÎȘȚ]/g, c => DIACRITICS_MAP[c] || c).toLowerCase(); }

function GlossaryPage() {
  const terms = window.ORG_GLOSAR || [];
  const tags  = window.GLOSAR_TAGS || [];
  const popular = window.GLOSAR_POPULAR || [];

  const [q, setQ] = useStateG('');
  const [activeTags, setActiveTags] = useStateG(new Set());

  // Open the term whose slug matches location.hash on first load
  useEffectG(() => {
    if (location.hash && location.hash.length > 1) {
      const el = document.getElementById(location.hash.slice(1));
      if (el) {
        if (el.tagName === 'DETAILS') el.open = true;
        setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
      }
    }
  }, []);

  const filtered = useMemoG(() => {
    const nq = strip(q);
    return terms.filter(t => {
      if (activeTags.size > 0 && !(t.tags || []).some(x => activeTags.has(x))) return false;
      if (!nq) return true;
      const hay = strip(t.term + ' ' + t.body + ' ' + (t.example || ''));
      return hay.includes(nq);
    });
  }, [q, activeTags, terms]);

  // Group by first letter (uppercase, diacritic-stripped)
  const grouped = useMemoG(() => {
    const m = {};
    for (const t of filtered) {
      const L = strip(t.term).charAt(0).toUpperCase() || '#';
      (m[L] = m[L] || []).push(t);
    }
    return m;
  }, [filtered]);

  const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const availableLetters = new Set(Object.keys(grouped));

  function toggleTag(id) {
    const next = new Set(activeTags);
    next.has(id) ? next.delete(id) : next.add(id);
    setActiveTags(next);
  }

  return (
    <>
      <section className="gl__hero">
        <div className="container">
          <div className="gl__crumbs">
            <a href="/">Acasă</a> › <span>Glosar</span>
          </div>
          <h1 className="gl__title">Glosar de finanțare pentru startupuri</h1>
          <p className="gl__sub">
            Termeni esențiali explicați simplu pentru fondatori, cercetători, startupuri și echipe care caută granturi, acceleratoare, capital non-dilutiv, investiții, consorții sau finanțare europeană.
          </p>
          <p className="gl__intro">
            Finanțarea pentru startupuri vine cu un limbaj propriu: grant, equity, TRL, consorțiu, cofinanțare, readiness, impact, work packages, milestone-uri, blended finance, cap table, runway, PMF, CAC, LTV sau due diligence. Acest glosar explică termenii pe care îi vei întâlni când cauți, compari sau aplici la programe de finanțare prin eligibil.org.
          </p>

          <input
            type="text"
            className="gl__search"
            placeholder="Caută un termen…  ex: TRL, MVP, EIC, cofinanțare, runway"
            value={q}
            onChange={e => setQ(e.target.value)}
          />
          <div className="gl__count">{filtered.length} din {terms.length} termeni afișați</div>

          <div className="gl__pills">
            <span className={'gl__pill' + (activeTags.size === 0 ? ' active' : '')} onClick={() => setActiveTags(new Set())}>Toți termenii</span>
            {tags.map(t => (
              <span key={t.id} className={'gl__pill' + (activeTags.has(t.id) ? ' active' : '')} onClick={() => toggleTag(t.id)}>
                {t.label}
              </span>
            ))}
          </div>
        </div>
      </section>

      <div className="container">
        <nav className="gl__az" aria-label="A–Z navigation">
          {allLetters.map(L => (
            <a
              key={L}
              href={availableLetters.has(L) ? '#L-' + L : undefined}
              className={availableLetters.has(L) ? '' : 'disabled'}
            >
              {L}
            </a>
          ))}
        </nav>

        {filtered.length === 0 ? (
          <div className="gl__empty">
            Niciun termen nu corespunde căutării. Încearcă alt cuvânt sau resetează filtrele.
          </div>
        ) : (
          allLetters.filter(L => grouped[L]).map(L => (
            <section key={L} id={'L-' + L} className="gl__letter">
              <h2>{L}</h2>
              {grouped[L].map(t => (
                <details key={t.slug} id={t.slug} className="gl__term">
                  <summary>{t.term}</summary>
                  <p>{t.body}</p>
                  {t.example && <div className="gl__ex"><strong>Exemplu:</strong> {t.example}</div>}
                  {t.tags?.length > 0 && (
                    <div className="gl__tags">
                      {t.tags.map(x => <span key={x} className="gl__tag">{(tags.find(y => y.id === x) || {}).label || x}</span>)}
                    </div>
                  )}
                </details>
              ))}
            </section>
          ))
        )}
      </div>

      <section className="gl__popular">
        <div className="container">
          <h3>Căutări populare</h3>
          <div className="gl__popular-chips">
            {popular.map(p => (
              <span key={p} className="gl__popular-chip" onClick={() => setQ(p)}>{p}</span>
            ))}
          </div>
        </div>
      </section>

      <section className="gl__cta">
        <div className="container">
          <h2>Nu știi ce program ți se potrivește?</h2>
          <p>
            Folosește eligibil.org pentru a compara granturi, acceleratoare și surse de capital non-dilutiv. Încarcă pitch deck-ul, video-ul sau whitepaper-ul și primește scoruri de potrivire, pregătire și pași concreți pentru aplicare.
          </p>
          <div className="gl__cta-btns">
            <a className="btn btn--accent" href="/search">Caută finanțare →</a>
            <a className="btn btn--ghost" href="/upload-artefact">Analizează startupul meu</a>
            <a className="btn btn--ghost" href="/search">Vezi catalogul de granturi</a>
            <a className="btn btn--ghost" href="/register.html">Creează profil startup</a>
          </div>
        </div>
      </section>
    </>
  );
}

function App() {
  const [lang, setLangState] = useStateG((window.getLanguage && window.getLanguage()) || 'RO');
  const setLang = (l) => { setLangState(l); if (window.setLanguage) window.setLanguage(l); };
  useEffectG(() => {
    const onLang = (e) => setLangState(e.detail.lang);
    window.addEventListener('languagechange', onLang);
    return () => window.removeEventListener('languagechange', onLang);
  }, []);
  return (
    <>
      <NavOrg lang={lang} setLang={setLang} />
      <GlossaryPage />
      <FooterOrg lang={lang} setLang={setLang} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>

<style>
  .gl__hero { padding: 64px 0 32px; border-bottom: 1px solid var(--border-soft); }
  .gl__crumbs { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .gl__crumbs a { color: inherit; text-decoration: none; }
  .gl__crumbs a:hover { color: var(--accent); }
  .gl__title { font-size: clamp(32px, 5vw, 52px); font-weight: 700; line-height: 1.05; margin: 0 0 8px; font-family: 'Space Grotesk', sans-serif; }
  .gl__sub { font-size: 18px; line-height: 1.45; color: var(--ink-1); max-width: 780px; margin: 16px 0 0; }
  .gl__intro { font-size: 15px; line-height: 1.6; color: var(--ink-2); max-width: 780px; margin: 16px 0 0; }
  .gl__search { width: 100%; padding: 14px 16px; border: 1px solid var(--border-soft); background: var(--bg-1); border-radius: 4px; font-family: inherit; font-size: 16px; margin-top: 28px; }
  .gl__search:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .gl__pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
  .gl__pill { padding: 6px 12px; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; cursor: pointer; user-select: none; transition: all .15s; }
  .gl__pill:hover { border-color: var(--accent); color: var(--accent); }
  .gl__pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .gl__az { display: flex; flex-wrap: wrap; gap: 6px; padding: 16px 0; margin: 24px 0; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); position: sticky; top: 0; background: var(--bg-1); z-index: 5; }
  .gl__az a { padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-1); text-decoration: none; border: 1px solid transparent; border-radius: 3px; }
  .gl__az a:hover { border-color: var(--accent); color: var(--accent); }
  .gl__az a.disabled { color: var(--ink-3, #aaa); pointer-events: none; }
  .gl__letter { padding: 32px 0 8px; }
  .gl__letter h2 { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: .12em; padding-bottom: 8px; border-bottom: 1px solid var(--accent); margin: 0 0 16px; }
  .gl__term { padding: 18px 0; border-bottom: 1px solid var(--border-soft); }
  .gl__term[open] summary { color: var(--accent); }
  .gl__term summary { cursor: pointer; font-weight: 600; font-size: 17px; padding-right: 28px; position: relative; font-family: 'Space Grotesk', sans-serif; }
  .gl__term summary::-webkit-details-marker { display: none; }
  .gl__term summary::after { content: '+'; position: absolute; right: 0; top: 0; font-size: 20px; color: var(--accent); }
  .gl__term[open] summary::after { content: '−'; }
  .gl__term p { margin: 12px 0 0; color: var(--ink-1); font-size: 15px; line-height: 1.6; white-space: pre-wrap; }
  .gl__term .gl__ex { margin: 10px 0 0; padding: 10px 14px; background: var(--bg-2); border-left: 3px solid var(--accent); font-size: 14px; color: var(--ink-2); font-style: italic; }
  .gl__term .gl__tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .gl__term .gl__tag { padding: 2px 8px; background: var(--bg-2); border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .06em; }
  .gl__popular { padding: 32px 0; background: var(--bg-2); border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
  .gl__popular h3 { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .1em; margin: 0 0 12px; }
  .gl__popular-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .gl__popular-chip { padding: 6px 12px; background: var(--bg-1); border: 1px solid var(--border-soft); border-radius: 3px; font-size: 13px; cursor: pointer; }
  .gl__popular-chip:hover { border-color: var(--accent); color: var(--accent); }
  .gl__empty { padding: 48px 0; text-align: center; color: var(--ink-2); font-style: italic; }
  .gl__cta { padding: 48px 0; background: var(--bg-2); border-top: 1px solid var(--border-soft); }
  .gl__cta h2 { font-size: 28px; margin: 0 0 8px; font-family: 'Space Grotesk', sans-serif; }
  .gl__cta p { font-size: 16px; color: var(--ink-2); margin: 0 0 20px; max-width: 680px; }
  .gl__cta-btns { display: flex; flex-wrap: wrap; gap: 12px; }
  .gl__count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-2); text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }
</style>

<script>
const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };
let tweaks = { accent: 'navy', density: 'balanced', dark: false };
(function () {
  document.documentElement.style.setProperty('--accent', ACCENTS[tweaks.accent]);
  document.body.classList.add('d-' + tweaks.density);
})();
</script>

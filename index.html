<div class="scroll-progress"><div class="scroll-progress__bar" id="scroll-bar"></div></div>

<div id="root"></div>

<div class="tweaks-panel" id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweaks-row"><label>Accent color</label><div class="tweaks-chips" id="tw-accents"></div></div>
  <div class="tweaks-row"><label>Density</label><div class="tweaks-chips" id="tw-density"></div></div>
  <div class="tweaks-row"><label>Mode</label><div class="tweaks-chips" id="tw-mode"></div></div>
  <div class="tweaks-row"><label>Show sample report</label><div class="tweaks-chips" id="tw-report"></div></div>
</div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "navy",
  "density": "balanced",
  "dark": false,
  "showReport": true
}/*EDITMODE-END*/;

const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };

function applyTweaks(t) {
  document.documentElement.style.setProperty('--accent', ACCENTS[t.accent] || ACCENTS.navy);
  document.body.classList.remove('d-spacious','d-balanced','d-dense');
  document.body.classList.add('d-' + (t.density || 'balanced'));
  document.body.classList.toggle('dark', !!t.dark);
  window.__TWEAKS = t;
  window.dispatchEvent(new CustomEvent('tweaks-change', { detail: t }));
}
let tweaks = { ...TWEAK_DEFAULTS };
applyTweaks(tweaks);

function renderTweaks() {
  const accents = document.getElementById('tw-accents');
  accents.innerHTML = '';
  Object.entries(ACCENTS).forEach(([k, v]) => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (tweaks.accent === k ? ' is-active' : '');
    b.style.display = 'flex'; b.style.alignItems = 'center'; b.style.gap = '6px';
    b.innerHTML = `<span class="tweaks-swatch" style="background:${v};width:12px;height:12px;border:1px solid #000"></span>${k}`;
    b.onclick = () => { tweaks.accent = k; persist(); };
    accents.appendChild(b);
  });
  const dens = document.getElementById('tw-density');
  dens.innerHTML = '';
  ['spacious','balanced','dense'].forEach(d => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (tweaks.density === d ? ' is-active' : '');
    b.textContent = d;
    b.onclick = () => { tweaks.density = d; persist(); };
    dens.appendChild(b);
  });
  const mode = document.getElementById('tw-mode'); mode.innerHTML = '';
  [['light',false],['dark',true]].forEach(([l, val]) => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (!!tweaks.dark === val ? ' is-active' : '');
    b.textContent = l;
    b.onclick = () => { tweaks.dark = val; persist(); };
    mode.appendChild(b);
  });
  const rep = document.getElementById('tw-report'); rep.innerHTML = '';
  [[true,'Show'],[false,'Hide']].forEach(([val, l]) => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (!!tweaks.showReport === val ? ' is-active' : '');
    b.textContent = l;
    b.onclick = () => { tweaks.showReport = val; persist(); };
    rep.appendChild(b);
  });
}
function persist() {
  applyTweaks(tweaks); renderTweaks();
  try { window.parent.postMessage({type: '__edit_mode_set_keys', edits: tweaks}, '*'); } catch (e) {}
}
renderTweaks();

const panel = document.getElementById('tweaks-panel');
window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') panel.classList.add('is-open');
  if (d.type === '__deactivate_edit_mode') panel.classList.remove('is-open');
});
try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch (e) {}

window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('scroll-bar').style.width = pct + '%';
});
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState: useStateApp, useEffect: useEffectApp } = React;

function App() {
  // Wire setLang to also call window.setLanguage so the lang.js engine
  // (DOM text-node replacement + MutationObserver) actually translates
  // everything on screen — not just the active-button styling.
  const [lang, setLangState] = useStateApp((window.getLanguage && window.getLanguage()) || 'RO');
  const setLang = (l) => { setLangState(l); if (window.setLanguage) window.setLanguage(l); };
  const [showReport, setShowReport] = useStateApp(window.__TWEAKS?.showReport ?? true);

  useEffectApp(() => {
    const onT    = (e) => setShowReport(!!e.detail.showReport);
    const onLang = (e) => setLangState(e.detail.lang);
    window.addEventListener('tweaks-change',   onT);
    window.addEventListener('languagechange',  onLang);
    return () => {
      window.removeEventListener('tweaks-change',  onT);
      window.removeEventListener('languagechange', onLang);
    };
  }, []);

  return (
    <>
      <NavOrg lang={lang} setLang={setLang} />
      <HeroOrg />
      <Deadlines />
      <UploadFlow />
      {showReport && <SampleReportOrg />}
      <ProductsOrg />
      <DocGenOrg />
      <ProgramsOrg />
      <VerticalsGrid />
      <AboutOrg />
      <VerifiedPartners />
      <ResourcesOrg />
      <ReportsOrg />
      <DataQualityOrg />
      <FAQOrg />
      <FinalCTAOrg />
      <FooterOrg lang={lang} setLang={setLang} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

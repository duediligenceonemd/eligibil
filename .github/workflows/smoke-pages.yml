name: Smoke Pages

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run public page smoke test
        run: npm run smoke:pages

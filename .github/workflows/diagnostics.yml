name: Diagnostics

on:
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: diagnostics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  environment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Show runtime and environment
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          node -v
          npm -v

      - name: Verify key project files
        run: |
          test -f package.json
          test -f package-lock.json
          test -f server.js
          test -d .github/workflows

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Show top-level dependency health
        run: npm ls --depth=0

      - name: Build
        run: npm run build

# =============================================================================
# Fly.io deployment config — eligibil.org
#
# Deploy:
#   1. Install flyctl: https://fly.io/docs/hands-on/install-flyctl/
#       PowerShell: iwr https://fly.io/install.ps1 -useb | iex
#   2. flyctl auth login
#   3. flyctl launch --copy-config --no-deploy   # uses this fly.toml
#   4. Set secrets:
#       flyctl secrets set SUPABASE_URL=https://...
#       flyctl secrets set SUPABASE_SERVICE_KEY=...
#       flyctl secrets set OPENAI_API_KEY=sk-...
#       flyctl secrets set ANTHROPIC_API_KEY=sk-ant-...
#       flyctl secrets set SESSION_SECRET="$(openssl rand -hex 32)"
#   5. flyctl deploy
#
# Free tier: 3 shared-cpu-1x VMs · 256MB RAM each · 3GB storage
# =============================================================================

app = "eligibil"
primary_region = "fra"          # Frankfurt — closest to MD/RO
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"   # save money — stop when idle
  auto_start_machines = true
  min_machines_running = 0      # scale to zero
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

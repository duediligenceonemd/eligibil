<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="/app-config.js" defer></script>
<script src="/analytics.js" defer></script>
<meta name="robots" content="noindex" />
<title>Pagină negăsită · eligibil.org</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#0e1620; --bg:#f7f5f0; --accent:#1f3a5f; --muted:#6b6e72; --rule:#d4cfc4; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,sans-serif; }
  main { max-width:640px; margin:0 auto; padding:120px 24px 80px; }
  .eyebrow { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
  h1 { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:48px; line-height:1.1; margin:0 0 16px; }
  p { font-size:18px; line-height:1.55; color:var(--muted); margin:0 0 32px; }
  .rule { border-top:1px solid var(--rule); margin:48px 0 32px; }
  .actions a { display:inline-block; margin-right:12px; padding:12px 20px; border:1px solid var(--accent); color:var(--accent); text-decoration:none; font-weight:500; transition:background 120ms; }
  .actions a:first-child { background:var(--accent); color:var(--bg); }
  .actions a:hover { background:var(--ink); border-color:var(--ink); color:var(--bg); }
  .lang { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-top:48px; }
  .lang a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<main>
  <div class="eyebrow">404 · NOT FOUND</div>
  <h1>Pagină negăsită</h1>
  <p>Grantul sau resursa pe care o cauți nu există sau a fost retrasă. Caută în baza noastră de granturi sau întoarce-te pe pagina principală.</p>
  <div class="actions">
    <a href="/">Pagina principală</a>
    <a href="/search">Caută granturi</a>
  </div>
  <div class="rule"></div>
  <div class="lang">EN · The grant or page you're looking for doesn't exist. <a href="/">Go to homepage</a> or <a href="/search">search grants</a>.</div>
</main>
</body>
</html>

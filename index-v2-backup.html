<meta property="og:description" content="Încarcă pitch deck-ul, video-ul sau whitepaper-ul. În 90 de secunde afli la ce granturi ești eligibil și ce trebuie să faci ca să devii maxim competitiv." />

<body class="d-balanced">

<div class="scroll-progress"><div class="scroll-progress__bar" id="scroll-bar"></div></div>

<div id="root"></div>

<div class="tweaks-panel" id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweaks-row"><label>Accent color</label><div class="tweaks-chips" id="tw-accents"></div></div>
  <div class="tweaks-row"><label>Density</label><div class="tweaks-chips" id="tw-density"></div></div>
  <div class="tweaks-row"><label>Mode</label><div class="tweaks-chips" id="tw-mode"></div></div>
  <div class="tweaks-row"><label>Strat AI</label><div class="tweaks-chips" id="tw-ai"></div></div>
</div>

<script>
const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };

let tweaks = { accent: 'navy', density: 'balanced', dark: false, showAI: true };

function applyTweaks(t) {
  document.documentElement.style.setProperty('--accent', ACCENTS[t.accent] || ACCENTS.navy);
  document.body.classList.remove('d-spacious','d-balanced','d-dense');
  document.body.classList.add('d-' + (t.density || 'balanced'));
  document.body.classList.toggle('dark', !!t.dark);
  window.__TWEAKS = t;
  window.dispatchEvent(new CustomEvent('tweaks-change', { detail: t }));
}
applyTweaks(tweaks);

function renderTweaks() {
  const accents = document.getElementById('tw-accents');
  accents.innerHTML = '';
  Object.entries(ACCENTS).forEach(([k, v]) => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (tweaks.accent === k ? ' is-active' : '');
    b.style.display = 'flex'; b.style.alignItems = 'center'; b.style.gap = '6px';
    b.innerHTML = `<span style="background:${v};width:12px;height:12px;border:1px solid #000;display:inline-block"></span>${k}`;
    b.onclick = () => { tweaks.accent = k; applyTweaks(tweaks); renderTweaks(); };
    accents.appendChild(b);
  });
  const dens = document.getElementById('tw-density');
  dens.innerHTML = '';
  ['spacious','balanced','dense'].forEach(d => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (tweaks.density === d ? ' is-active' : '');
    b.textContent = d;
    b.onclick = () => { tweaks.density = d; applyTweaks(tweaks); renderTweaks(); };
    dens.appendChild(b);
  });
  const mode = document.getElementById('tw-mode'); mode.innerHTML = '';
  [['light',false],['dark',true]].forEach(([l, val]) => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (!!tweaks.dark === val ? ' is-active' : '');
    b.textContent = l;
    b.onclick = () => { tweaks.dark = val; applyTweaks(tweaks); renderTweaks(); };
    mode.appendChild(b);
  });
  const ai = document.getElementById('tw-ai'); ai.innerHTML = '';
  [[true,'Show'],[false,'Hide']].forEach(([val, l]) => {
    const b = document.createElement('button');
    b.className = 'tweaks-chip' + (!!tweaks.showAI === val ? ' is-active' : '');
    b.textContent = l;
    b.onclick = () => { tweaks.showAI = val; applyTweaks(tweaks); renderTweaks(); };
    ai.appendChild(b);
  });
}
renderTweaks();

const panel = document.getElementById('tweaks-panel');
document.addEventListener('keydown', (e) => {
  if (e.key === 't' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); panel.classList.toggle('is-open'); }
});

window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  document.getElementById('scroll-bar').style.width = pct + '%';
});
</script>

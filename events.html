<!-- Diagnostic: pre-fill root with skeleton + visible error panel that lang.js
     can translate but won't be overwritten unless React's createRoot succeeds. -->
<div id="ev-root">
  <div id="ev-skeleton" style="font-family:system-ui,sans-serif;padding:60px 32px;max-width:980px;margin:0 auto;color:#1a1a1a">
    <div style="font-family:'JetBrains Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#666;margin-bottom:14px">Calendar · Loading…</div>
    <h1 style="font-size:48px;line-height:1.05;letter-spacing:-.02em;margin:0 0 16px">Unde se întâmplă <em style="color:#1f3a5f;font-style:normal">viitorul</em> în regiunea ta.</h1>
    <p style="color:#666;font-size:17px;max-width:600px;margin-bottom:32px">Se încarcă evenimente live din API…</p>
    <div id="ev-skeleton-error" style="display:none;background:#fff5f5;border:1px solid #fca;padding:14px;font-family:monospace;font-size:12px;overflow:auto;white-space:pre-wrap;max-width:980px"></div>
  </div>
</div>

<script>
window.__evErrors = [];
window.addEventListener('error', (e) => {
  const msg = (e.error && e.error.message) || e.message || 'error';
  const src = e.filename ? ' [' + e.filename.split('/').pop() + ':' + e.lineno + ']' : '';
  window.__evErrors.push(msg + src);
  console.error('[ev-diag]', msg, e);
  const errBox = document.getElementById('ev-skeleton-error');
  if (errBox) {
    errBox.style.display = 'block';
    errBox.textContent = window.__evErrors.join('\n');
  }
});
window.addEventListener('unhandledrejection', (e) => {
  const msg = (e.reason && e.reason.message) || String(e.reason);
  window.__evErrors.push('PROMISE: ' + msg);
  console.error('[ev-diag promise]', e.reason);
  const errBox = document.getElementById('ev-skeleton-error');
  if (errBox) { errBox.style.display = 'block'; errBox.textContent = window.__evErrors.join('\n'); }
});
// After 3s, audit what React actually rendered. Two failure modes:
//  (a) skeleton still in DOM → React never mounted
//  (b) skeleton gone but root has 0 height/width → invisible mount
setTimeout(() => {
  const root = document.getElementById('ev-root');
  const skel = document.getElementById('ev-skeleton');
  if (!root) return;
  const rect = root.getBoundingClientRect();
  const first = root.firstElementChild;
  const firstRect = first ? first.getBoundingClientRect() : null;

  // If mounted normally (Topbar visible, height > 100), do nothing
  if (rect.height > 200 && !skel) return;

  // Otherwise, inject a visible diagnostic panel as a FRESH sibling of root
  const diag = document.createElement('div');
  diag.style.cssText = 'position:fixed;inset:0;background:#fff;color:#000;font-family:monospace;font-size:12px;padding:24px;overflow:auto;z-index:99998;white-space:pre-wrap;line-height:1.5;border:4px solid red';
  diag.textContent =
    '═══ /evenimente DIAGNOSTIC ═══\n\n' +
    'Skeleton present: ' + !!skel + '\n' +
    'Root tag: ' + root.tagName + '\n' +
    'Root rect: w=' + rect.width.toFixed(0) + ' h=' + rect.height.toFixed(0) + ' top=' + rect.top.toFixed(0) + '\n' +
    'Root childElementCount: ' + root.childElementCount + '\n' +
    'Root innerHTML length: ' + root.innerHTML.length + '\n' +
    'Root first child: ' + (first ? first.tagName + '.' + (first.className || '(no class)') : '(none)') + '\n' +
    'First child rect: ' + (firstRect ? 'w=' + firstRect.width.toFixed(0) + ' h=' + firstRect.height.toFixed(0) : 'n/a') + '\n' +
    'Root computed display: ' + getComputedStyle(root).display + '\n' +
    'Root computed visibility: ' + getComputedStyle(root).visibility + '\n' +
    'Root computed opacity: ' + getComputedStyle(root).opacity + '\n\n' +
    'window.React: ' + (typeof window.React) + ' v=' + (window.React && window.React.version) + '\n' +
    'window.ReactDOM: ' + (typeof window.ReactDOM) + ' v=' + (window.ReactDOM && window.ReactDOM.version) + '\n' +
    'window.Babel: ' + (typeof window.Babel) + '\n\n' +
    'Errors captured: ' + (window.__evErrors.join('\n  • ') || '(none)') + '\n\n' +
    'innerHTML preview (first 400 chars):\n' +
    root.innerHTML.substring(0, 400);
  document.body.appendChild(diag);
}, 3000);
</script>

<script>
const ACCENTS = { navy:'#1f3a5f', forest:'#0a5c3e', rust:'#c24a1e', black:'#1a1a1a', plum:'#6b46c1' };
(function() {
  var accent = localStorage.getItem('ev-accent') || 'navy';
  var density = localStorage.getItem('ev-density') || 'balanced';
  var dark = localStorage.getItem('ev-dark') === 'true';
  document.documentElement.style.setProperty('--accent', ACCENTS[accent] || ACCENTS.navy);
  document.body.classList.remove('d-spacious','d-balanced','d-dense');
  document.body.classList.add('d-' + density);
  document.body.classList.toggle('dark', dark);
})();
</script>

<!-- Schema.org ItemList for SEO — runs after components mount, fetches the
     same /api/events the page consumes and injects up to 20 entries. -->
<script>
window.addEventListener('load', async () => {
  try {
    const r = await fetch('/api/events');
    if (!r.ok) return;
    const data = await r.json();
    const items = [...(data.grant_deadlines || []), ...(data.events || [])].slice(0, 20);
    if (!items.length) return;
    const json = {
      '@context': 'https://schema.org',
      '@type': 'ItemList',
      'itemListElement': items.map((e, i) => ({
        '@type': 'ListItem',
        'position': i + 1,
        'item': {
          '@type': e.event_type === 'grant_deadline' ? 'Thing' : 'Event',
          'name': e.title || e.short_summary || '',
          'startDate': e.start_date,
          'location': e.is_online ? 'Online' : (e.city || e.country || 'Online'),
          'url': e.url
            ? new URL(e.url, location.origin).toString()
            : (e.slug_ro ? location.origin + '/evenimente/' + e.slug_ro : location.href),
        },
      })),
    };
    const s = document.createElement('script');
    s.type = 'application/ld+json';
    s.textContent = JSON.stringify(json);
    document.head.appendChild(s);
  } catch { /* JSON-LD is best-effort; never break the page */ }
});
</script>

</body>
